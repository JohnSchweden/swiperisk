
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0c">
    <title>K-Maru</title>
    <meta property="og:title" content="K-Maru" />
    <meta property="og:description" content="AI Kobayashi Maru: A No-Win Simulation for the Brave" />
    <meta name="description" content="AI Kobayashi Maru: A No-Win Simulation for the Brave">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=optional');
        
        :root {
          /* Animation Timing Hierarchy
             Quick (150ms): Button hovers, micro-interactions, feedback
             Medium (450ms): Stage transitions, card swipes, progress bars  
             Slow (600ms): Emphasis animations, celebrations, modal overlays
             
             Easing: cubic-bezier(0.25, 0.46, 0.45, 0.94) - smooth ease-out
             Stage transitions use fade only (no directional movement)
             to avoid confusion with swipe gestures.
          */
          --anim-quick: 150ms;
          --anim-medium: 450ms;
          --anim-slow: 600ms;
          
          /* Design System - Colors */
          --color-bg-primary: #0a0a0c;
          --color-bg-failure: #1a0505;
          --color-bg-success: #051a0d;
          --color-bg-tertiary: #1e293b;
          --color-text-primary: #f8fafc;
          --color-text-secondary: #94a3b8;
          --color-text-muted: #64748b;
          --color-accent: #22d3ee;
          --color-accent-hover: #06b6d4;
          --color-success: #22c55e;
          --color-warning: #eab308;
          --color-danger: #ef4444;
          
          /* Design System - Typography Scale */
          --text-xs: 0.75rem;
          --text-sm: 0.875rem;
          --text-base: 1rem;
          --text-lg: 1.125rem;
          --text-xl: 1.25rem;
          --text-2xl: 1.5rem;
          --text-3xl: 1.875rem;
          --text-4xl: 2.25rem;
          --text-5xl: 3rem;
          --text-6xl: 3.75rem;
          
          /* Design System - Spacing Scale */
          --space-1: 0.25rem;
          --space-2: 0.5rem;
          --space-3: 0.75rem;
          --space-4: 1rem;
          --space-6: 1.5rem;
          --space-8: 2rem;
          --space-10: 2.5rem;
          --space-12: 3rem;
          --space-16: 4rem;
          
          /* Design System - Border Radius */
          --radius-sm: 0.25rem;
          --radius-md: 0.375rem;
          --radius-lg: 0.5rem;
          --radius-xl: 0.75rem;
          --radius-2xl: 1rem;
          
          /* Design System - Shadows */
          --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
          --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
          --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
          --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
          --shadow-glow: 0 0 20px rgba(34, 211, 238, 0.3);
        }
        
        body {
            font-family: 'Space+Grotesk', sans-serif;
            background-color: #0a0a0c;
            color: #e2e8f0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .mono {
            font-family: 'JetBrains+Mono', monospace;
        }

        /* CRT Overlay Effect - full screen */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.035), rgba(0, 255, 0, 0.015), rgba(0, 0, 255, 0.012));
            z-index: 10000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Softer CRT while intro starfield runs — reduces moiré / “dirty” beat with 1px dots */
        html[data-starfield] body::after {
            opacity: 0.38;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .glitch-text:hover {
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
            text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9;
        }

        .card-shadow {
            box-shadow: 0 10px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .swipe-gradient-right {
            background: linear-gradient(to right, transparent, rgba(34, 211, 238, 0.06));
        }
        .swipe-gradient-left {
            background: linear-gradient(to left, transparent, rgba(245, 158, 11, 0.15));
        }

        /* Swipe exit animations */
        .swipe-exit-left {
            animation: swipeExitLeft 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            will-change: transform, opacity;
        }

        .swipe-exit-right {
            animation: swipeExitRight 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            will-change: transform, opacity;
        }

        /* Spring physics snap-back animation */
        .spring-snap-back {
            transition: transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }

        /* Performance Optimizations for Active Card */
        .swipe-card {
            will-change: transform, opacity;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0); /* Force GPU layer creation */
            touch-action: pan-y; /* Allow vertical scroll, handle horizontal in JS */
        }

        @keyframes swipeExitLeft {
            from {
                transform: translateX(0) rotate(0deg);
                opacity: 1;
            }
            to {
                transform: translateX(-120%) rotate(-25deg);
                opacity: 0;
            }
        }

        @keyframes swipeExitRight {
            from {
                transform: translateX(0) rotate(0deg);
                opacity: 1;
            }
            to {
                transform: translateX(120%) rotate(25deg);
                opacity: 0;
            }
        }

        .bg-stripes {
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.05) 0px,
                rgba(255, 255, 255, 0.05) 1px,
                transparent 1px,
                transparent 6px
            );
        }

        /*
         * Stage entrance: animated via ::before pseudo-overlay instead of the element's own
         * opacity. This preserves the backdrop root at window level so descendant glass-card
         * elements can sample the fixed starfield canvas. Directly animating opacity on a
         * parent turns it into a backdrop root while opacity < 1, breaking backdrop-filter.
         */
        .stage-transition {
            position: relative;
        }
        .stage-transition::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #0a0a0c; /* matches canvas BG */
            pointer-events: none;
            animation: fadeOutOverlay var(--anim-medium) cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        /* Content sits above the fading overlay */
        .stage-transition > * {
            position: relative;
            z-index: 2;
        }
        /* Firefox scrollbar */
        .stage-overlay {
            scrollbar-width: thin;
            scrollbar-color: rgba(148, 163, 184, 0.25) transparent;
        }
        @keyframes fadeOutOverlay {
            from { opacity: 1; }
            to   { opacity: 0; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes cursor-blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .cursor-blink {
            animation: cursor-blink 1s step-end infinite;
        }

        .card-transition {
            animation: cardSlideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Soft scanline running over screen */
        .scanline-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .scanline {
            position: absolute;
            width: 100%;
            height: 1px;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(6, 182, 212, 0.06) 30%,
                rgba(6, 182, 212, 0.15) 50%,
                rgba(6, 182, 212, 0.06) 70%,
                transparent 100%
            );
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.1), 0 0 30px rgba(6, 182, 212, 0.06);
            animation: scanlineMove 8s ease-in-out infinite;
        }

        @keyframes scanlineMove {
            0% {
                top: -1px;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                top: 100vh;
                opacity: 0;
            }
        }

        /* Button hover transitions */
        button {
            transition: background-color var(--anim-quick) cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        border-color var(--anim-quick) cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        color var(--anim-quick) cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        transform var(--anim-quick) cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        opacity var(--anim-quick) cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border-radius: 0;
        }

        /*
         * Unlayered `button` above beats Tailwind @layer utilities, so rounded-* on
         * PersonalitySelect / RoleSelect never applied. Higher specificity + design token.
         */
        button.selection-stage-card {
            border-radius: var(--radius-xl);
        }

        /* Progress bar smooth animation */
        .progress-bar {
            transition: width var(--anim-medium) cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Phase 04: HUD escalation when under pressure */
        .pressure-hud-intense {
            filter: drop-shadow(0 0 6px rgba(239, 68, 68, 0.25));
        }

        /* Phase 04: Card-level stress visuals (shake, flicker, pulse) */
        @keyframes pressure-shake-keyframes {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-1px); }
            75% { transform: translateX(1px); }
        }
        @keyframes pressure-flicker-keyframes {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.97; }
        }
        @keyframes pressure-pulse-keyframes {
            0%, 100% { box-shadow: 0 0 0 1px transparent; }
            50% { box-shadow: 0 0 8px 1px rgba(239, 68, 68, 0.35); }
        }
        .pressure-shake {
            animation: pressure-shake-keyframes 0.15s ease-in-out infinite;
        }
        /* Counter-shake: negates parent shake so inner content (text) stays readable */
        @keyframes pressure-shake-counter-keyframes {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(1px); }
            75% { transform: translateX(-1px); }
        }
        .pressure-shake-counter {
            animation: pressure-shake-counter-keyframes 0.15s ease-in-out infinite;
        }
        .pressure-flicker {
            animation: pressure-flicker-keyframes 0.2s ease-in-out infinite;
        }
        .pressure-pulse {
            animation: pressure-pulse-keyframes 1s ease-in-out infinite;
            /* Include box-shadow so compositor repaints glow; swipe-card's will-change: transform alone skips box-shadow updates until touch */
            will-change: transform, opacity, box-shadow;
        }
        /* Overlay variant: no will-change, sits outside card's transform layer — glow visible from first frame */
        .pressure-pulse-overlay {
            animation: pressure-pulse-keyframes 1s ease-in-out infinite;
        }

        /*
         * Feedback modal: dim fade lives on ::before so the overlay root stays opacity:1.
         * Animating opacity on an ancestor breaks descendant backdrop-filter (glass-card).
         */
        .modal-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 0;
            animation: overlayFadeIn 0.3s ease-out forwards;
        }
        /* Scale-only on the panel — no opacity on .glass-card (same backdrop-filter rule as stage-transition). */
        .modal-overlay > .modal-content {
            position: relative;
            z-index: 1;
            animation: modalScaleIn 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        /*
         * Kirk corruption: feedback modal is a sibling above the game shell (z-10 vs z-50),
         * so the game container's .kirk-corrupted layer is fully covered. Mirror the cyan
         * scanline tint on the modal backdrop only (no filter on the overlay root — breaks glass).
         */
        .modal-overlay--kirk::before {
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 255, 0.035) 2px,
                    rgba(0, 255, 255, 0.035) 4px
                ),
                linear-gradient(
                    180deg,
                    rgba(0, 45, 52, 0.42) 0%,
                    rgba(0, 0, 0, 0.52) 100%
                );
        }

        @keyframes overlayFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalScaleIn {
            from {
                transform: scale(0.92) translateY(20px);
            }
            to {
                transform: none;
            }
        }

        /* Ticket window transition - fade and scale */
        .ticket-transition {
            animation: ticketFadeScale 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        /* Roast button loading spinner - custom animation so button transition cannot override it */
        @keyframes roast-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .roast-spinner {
            animation: roast-spin 0.8s linear infinite;
        }

        @keyframes ticketFadeScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Answer window - instant full screen overlay */
        .answer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer-window {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
            }
            
            /* Ensure minimum touch target size (exclude range: 44px min-height reads as huge vertical padding) */
            button:not(.compact-touch-target),
            [role="button"]:not(.compact-touch-target),
            input:not([type="range"]),
            textarea,
            select {
                min-height: 44px;
                min-width: 44px;
            }

            /* Icon-sized controls keep authored h/w (matches desktop starfield panel) */
            button.compact-touch-target,
            [role="button"].compact-touch-target {
                min-height: unset;
                min-width: unset;
            }
            
            /* Prevent text selection on interactive elements */
            button {
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
            }
            
        }

        /* Disable CRT effect on mobile for performance */
        /*
        @media (max-width: 768px) {
            body::after {
                display: none;
            }
        }
        */

        /* Native smooth scrollbar */
        html {
            scroll-behavior: smooth;
        }

        /* Prevent layout shifts from scrollbar on desktop */
        @media (min-width: 1024px) {
            html {
                scrollbar-gutter: stable;
            }
        }

        /* Minimalist scrollbar - only visible when scrolling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
            background: transparent;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(148, 163, 184, 0.35), rgba(148, 163, 184, 0.15));
            border-radius: 9999px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(148, 163, 184, 0.5), rgba(148, 163, 184, 0.25));
        }

        ::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* Firefox scrollbar */
        html {
            scrollbar-width: thin;
            scrollbar-color: rgba(148, 163, 184, 0.25) transparent;
        }

        /* Hide scrollbar utility for carousels */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Prevent pull-to-refresh on mobile */
        body {
            overscroll-behavior-y: none;
        }

        /* Screen-reader only (a11y) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ── Kirk Easter Egg CSS ─────────────────────────────────────────────── */

        /* Level 1: Subtle flicker — applied briefly on first refusal */
        @keyframes kirk-flicker {
            0%, 100% { opacity: 1; filter: none; }
            25% { opacity: 0.8; filter: hue-rotate(90deg) saturate(3); }
            50% { opacity: 0.6; filter: invert(1); transform: translateX(2px); }
            75% { opacity: 0.9; filter: hue-rotate(-90deg); }
        }
        .kirk-flicker { animation: kirk-flicker 0.15s ease; }

        /* Level 2: Persistent corruption — added on second refusal, stays active */
        @keyframes kirk-corrupt {
            0% { filter: none; }
            10% { filter: hue-rotate(30deg) brightness(1.1); transform: skewX(0.5deg); }
            30% { filter: none; transform: none; }
            50% { filter: saturate(2) brightness(0.9); transform: translateX(-1px); }
            70% { filter: none; transform: none; }
            90% { filter: hue-rotate(-20deg); transform: skewX(-0.3deg); }
        }
        .kirk-corrupted { animation: kirk-corrupt 0.3s infinite; }
        .kirk-corrupted::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,255,0.03) 2px, rgba(0,255,255,0.03) 4px);
            pointer-events: none;
            z-index: 1000;
        }

        /* Glitch text — for corrupted card text and debrief */
        @keyframes kirk-text-glitch {
            0%, 100% { text-shadow: 2px 0 #ff0000, -2px 0 #00ffff; }
            25% { text-shadow: -2px 0 #ff0000, 2px 0 #00ffff; transform: skewX(1deg); }
            50% { text-shadow: 1px 1px #ff0000, -1px -1px #00ffff; }
            75% { text-shadow: -1px 0 #ff0000, 1px 0 #00ffff; transform: skewX(-0.5deg); }
        }
        .kirk-glitch-text {
            text-shadow: 2px 0 #ff0000, -2px 0 #00ffff;
            animation: kirk-text-glitch 0.5s infinite;
        }

        /* Accessibility: reduced motion fallbacks */
        @media (prefers-reduced-motion: reduce) {
            .kirk-corrupted { animation: none; }
            .kirk-corrupted::before { background: rgba(0,255,255,0.05); }
            .kirk-flicker { animation: none; opacity: 0.7; }
            .kirk-glitch-text { animation: none; text-shadow: 1px 0 #ff0000, -1px 0 #00ffff; }
            .modal-overlay--kirk::before {
                background: linear-gradient(
                    180deg,
                    rgba(0, 55, 60, 0.5) 0%,
                    rgba(0, 0, 0, 0.55) 100%
                );
            }
        }

        /* Phase 14: Glitch placeholder aesthetic */
        .glitch-placeholder {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .glitch-placeholder::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(34, 211, 238, 0.03) 2px,
                rgba(34, 211, 238, 0.03) 4px
            );
            animation: glitch-scan 2s linear infinite;
            pointer-events: none;
        }

        .glitch-placeholder::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(34, 211, 238, 0.05) 50%,
                transparent 100%
            );
            animation: glitch-flicker 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glitch-scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes glitch-flicker {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
            52% { opacity: 0; }
            54% { opacity: 1; }
            56% { opacity: 0; }
        }

        /* Glassmorphism - real glass effect with low opacity + strong blur + saturation */
        .glass-card {
          background: rgba(71, 71, 71, 0.22);
          border: 1px solid rgba(255, 255, 255, 0.08);
          box-shadow: 0 10px 20px rgba(0, 0, 0, 0.16);
          backdrop-filter: blur(8px) saturate(150%);
          -webkit-backdrop-filter: blur(8px) saturate(150%);
        }

        /* Feedback / modal panels: deeper slate tint + larger blur for a softer, darker read */
        .glass-card-modal {
          background: rgba(15, 22, 36, 0.5);
          border: 1px solid rgba(255, 255, 255, 0.07);
          box-shadow: 0 16px 48px rgba(0, 0, 0, 0.32);
          backdrop-filter: blur(18px) saturate(135%);
          -webkit-backdrop-filter: blur(18px) saturate(135%);
        }

        /* Unlayered hover: Tailwind loses to .glass-card; .selection-card-hover gates when stage allows hover */
        button.selection-stage-card.glass-card.selection-card-hover {
            transition:
                border-color var(--anim-quick) cubic-bezier(0.25, 0.46, 0.45, 0.94),
                box-shadow var(--anim-quick) cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        button.selection-stage-card.glass-card.selection-card-hover:hover {
            /* Lighter cyan than cyan-500 so the stroke reads softer on glass */
            border-color: rgba(34, 211, 238, 0.28);
            box-shadow:
                0 10px 20px rgba(0, 0, 0, 0.16),
                0 14px 48px -8px rgba(6, 182, 212, 0.32);
        }

        .glass-strong {
          background: rgba(20, 20, 20, 0.45);
          border: 1px solid rgba(255, 255, 255, 0.08);
          box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
          backdrop-filter: blur(12px) saturate(160%);
          -webkit-backdrop-filter: blur(12px) saturate(160%);
        }

        .glass-header {
          background: rgba(14, 14, 14, 0.25);
          backdrop-filter: blur(20px) saturate(180%);
